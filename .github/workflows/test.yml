name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt actions/checkout and actions/setup-node into Node 24 ahead of the
# June 2026 forced cutover, so we don't see the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Run tests
        run: npm test
